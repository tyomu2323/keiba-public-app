<!doctype html><html lang="ja"><head>
  <meta name="robots" content="noindex,nofollow"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>管理者画面</title><link rel="stylesheet" href="style.css"></head><body><header><h1>管理者画面</h1><a href="/">公開画面</a></header><main><section class="card" id="loginBox"><h2>ログイン</h2><input id="user" placeholder="ユーザー名" value="admin"><input id="pass" placeholder="パスワード" type="password"><button onclick="login()">ログイン</button><p id="loginMsg"></p></section><section class="card admin-only hidden"><h2>任意タイミングでデータ取得</h2><div class="row"><label>対象</label><select id="target"><option value="weekend">今週全レース</option><option value="races">出馬表</option><option value="workouts">追い切り</option><option value="results">結果</option><option value="jockeys">騎手成績</option></select></div><div class="row"><label>開始日</label><input id="dateFrom" type="date"><label>終了日</label><input id="dateTo" type="date"></div><button onclick="manualFetch()">取得実行</button><pre id="fetchResult"></pre></section>
  <section class="card admin-only hidden"><h2>レース別の印登録</h2><p class="muted">出走レースに対して◎○▲△などを付けます。公開画面のレース詳細とおすすめ馬欄に表示されます。</p><div class="row"><select id="raceSelect"></select><select id="horseSelect"></select><select id="mark"><option>◎</option><option>○</option><option>▲</option><option>△</option><option>☆</option><option>消</option></select><input id="confidence" type="number" min="1" max="5" value="4" placeholder="信頼度"></div><textarea id="reason" placeholder="推奨理由"></textarea><textarea id="betNote" placeholder="買い方メモ"></textarea><input id="addScore" type="number" value="10" placeholder="おすすめ加点"><button onclick="saveRecommendation()">印を登録</button><p id="recMsg"></p></section>
  <section class="card admin-only hidden"><h2>馬名登録・出走アラート</h2><p class="muted">レース指定ではなく馬名で登録します。登録馬が出走表に入ると公開画面でポップアップ/一覧表示します。</p><div class="row"><input id="watchHorseName" placeholder="馬名"><select id="watchMark"><option>注目</option><option>本命候補</option><option>穴候補</option><option>次走買い</option><option>危険馬</option></select></div><textarea id="watchNote" placeholder="登録理由・メモ"></textarea><button onclick="saveWatchHorse()">馬名で登録</button><p id="watchMsg"></p><h3>登録馬一覧</h3><div id="watchList" class="grid"></div></section>
  <section class="card admin-only hidden"><h2>バイアス入力</h2><p class="muted">開催場所ごとに入力できます。日付・開催場・芝/ダートの組み合わせで保存します。</p><div id="biasVenueButtons" class="row"></div><div class="row"><input id="biasDate" type="date"><input id="biasVenue" placeholder="東京"><select id="biasSurface"><option>芝</option><option>ダート</option></select></div><div class="row"><input id="inside" type="number" placeholder="内"><input id="outside" type="number" placeholder="外"><input id="front" type="number" placeholder="逃げ"><input id="stalker" type="number" placeholder="先行"><input id="closer" type="number" placeholder="差し"><input id="deepCloser" type="number" placeholder="追込"></div><textarea id="biasComment" placeholder="土曜は内前が残る、など"></textarea><button onclick="saveBias()">バイアス保存</button><p id="biasMsg"></p></section><section class="card admin-only hidden"><h2>取得ログ</h2><button onclick="loadLogs()">更新</button><pre id="logs"></pre></section></main><script src="admin.js"></script></body></html>
